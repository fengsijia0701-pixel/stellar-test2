<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我是谁 - 综合方案</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #1a2f1a 0%, #0f1f0f 100%);
      min-height: 100vh;
      padding: 40px 20px;
      font-family: 'Ma Shan Zheng', cursive;
      color: #E8DCC8;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 综合方案：档案袋布局 + A的色彩 */
    .combined-scheme {
      width: 100%;
      max-width: 800px;
    }

    /* 档案袋外壳 - 采用A的木框色彩 */
    .file-folder {
      background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #6B3E26 100%);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .folder-tab {
      background: linear-gradient(180deg, #5D4037 0%, #4E342E 100%);
      color: #F5E6C8;
      padding: 10px 24px;
      display: inline-block;
      border-radius: 6px 6px 0 0;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.5rem;
      letter-spacing: 1px;
      margin-bottom: -4px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
    }

    .folder-inner {
      background: linear-gradient(180deg, #F5E6C8 0%, #E8DCC8 100%);
      border-radius: 4px;
      padding: 24px 28px;
      color: #5D3A1A;
      min-height: 500px;
    }

    /* 主标题 */
    .main-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.7rem;
      color: #5D3A1A;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .main-title-zh {
      font-family: 'ZCOOL QingKe HuangYou', cursive;
      font-size: 1.8rem;
      margin-bottom: 4px;
    }

    /* 核心优势引言 */
    .quote-section {
      background: linear-gradient(135deg, #5D4037 0%, #4E342E 100%);
      border-radius: 6px;
      padding: 14px 18px;
      margin-bottom: 20px;
      position: relative;
    }

    .quote-section::before {
      content: '"';
      position: absolute;
      left: 8px;
      top: 5px;
      font-family: 'Press Start 2P', cursive;
      font-size: 1.2rem;
      color: #8B5A2B;
    }

    .quote-text {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.15rem;
      color: #F5E6C8;
      text-align: center;
      line-height: 1.6;
      padding-left: 15px;
    }

    /* 分区样式 */
    .resume-section {
      margin-bottom: 18px;
    }

    .resume-label {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.45rem;
      color: #8B4513;
      letter-spacing: 1px;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 2px solid #8B4513;
    }

    /* 经历列表 */
    .exp-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .exp-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.05rem;
      color: #5D3A1A;
      line-height: 1.4;
    }

    .exp-icon {
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* 两列布局 */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .two-col { grid-template-columns: 1fr; }
    }

    /* 技能列表 */
    .skill-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .skill-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 英文标签用 English font */
    .en-label {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.5rem;
      color: #5D3A1A;
    }

    /* 中文内容用中文font */
    .zh-text {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1rem;
      color: #5D3A1A;
    }

    .en-text {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.45rem;
      letter-spacing: 0.5px;
    }

    .skill-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .skill-tag.tech {
      background: linear-gradient(135deg, #9575CD, #7E57C2);
      color: white;
    }

    .skill-tag.cert {
      background: linear-gradient(135deg, #FFD700, #FFC107);
      color: #5D3A1A;
    }

    /* 爱好 */
    .hobby-list {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hobby-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #F48FB1, #F06292);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1rem;
    }

    /* 教育背景 - 特别样式 */
    .edu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.05rem;
      color: #5D3A1A;
      background: rgba(139, 69, 19, 0.1);
      padding: 8px 12px;
      border-radius: 6px;
      border-left: 3px solid #8B4513;
    }
  </style>
</head>
<body>
  <div class="combined-scheme">
    <div class="file-folder">
      <div class="folder-tab">📁 ABOUT ME</div>
      <div class="folder-inner">
        <div class="main-title">
          <div class="main-title-zh">🌻 我是谁</div>
          ABOUT ME
        </div>

        <div class="quote-section">
          <div class="quote-text">相信好的产品力 + 运营力 + 数据力，能够创造可持续的增长飞轮。</div>
        </div>

        <div class="resume-section">
          <div class="resume-label en-label">// EDUCATION</div>
          <div class="edu-item zh-text">
            <span>🎓</span>
            <span>香港大学 市场营销硕士</span>
          </div>
        </div>

        <div class="resume-section">
          <div class="resume-label en-label">// INTERNSHIP EXPERIENCE</div>
          <div class="exp-list">
            <div class="exp-item zh-text">
              <span class="exp-icon">🟊</span>
              <span>字节跳动 TikTok — 印尼电商策略实习生</span>
            </div>
            <div class="exp-item zh-text">
              <span class="exp-icon">📕</span>
              <span>小红书 — 商业产品实习生</span>
            </div>
            <div class="exp-item zh-text">
              <span class="exp-icon">🔴</span>
              <span>美团 / 哈啰 / 美敦力 / 默克 / 安永</span>
            </div>
          </div>
        </div>

        <div class="two-col">
          <div class="resume-section">
            <div class="resume-label en-label">// SKILLS</div>
            <div class="skill-list">
              <div class="skill-item">
                <span class="skill-tag tech"><span class="en-text">AI Coding</span></span>
              </div>
              <div class="skill-item">
                <span class="skill-tag tech"><span class="en-text">Python</span></span>
              </div>
              <div class="skill-item">
                <span class="skill-tag tech"><span class="en-text">MySQL</span></span>
              </div>
            </div>
          </div>

          <div class="resume-section">
            <div class="resume-label en-label">// CERTIFICATIONS</div>
            <div class="skill-list">
              <div class="skill-item">
                <span class="skill-tag cert"><span class="en-text">IELTS 7.5</span></span>
              </div>
              <div class="skill-item">
                <span class="skill-tag cert"><span class="en-text">ACCA</span></span>
              </div>
            </div>
          </div>
        </div>

        <div class="resume-section">
          <div class="resume-label en-label">// HOBBIES</div>
          <div class="hobby-list">
            <span class="hobby-tag zh-text">🎵 R&B爱好者</span>
            <span class="hobby-tag zh-text">📚 史穿研究ing</span>
            <span class="hobby-tag zh-text">🎮 戴夫抓鱼者</span>
            <span class="hobby-tag zh-text">🌟 内娱一点通</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
